<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juhi Sharma — Product Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0A0A;
      --bg2: #111111;
      --bg3: #1A1A1A;
      --red: #E50914;
      --red-dim: #991010;
      --gold: #C9A84C;
      --white: #F0EDE8;
      --grey: #888880;
      --grey-dim: #444440;
      --border: #222220;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 24px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s, background 0.3s;
    }
    nav.scrolled {
      background: rgba(10,10,10,0.95);
      border-bottom-color: var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--white); text-decoration: none;
    }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a {
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--grey); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--white); }

    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 120px 60px 80px;
      gap: 80px;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 40%; height: 100%;
      background: radial-gradient(ellipse at top right, rgba(229,9,20,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-left { max-width: 580px; }
    .hero-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red); margin-bottom: 32px;
      display: flex; align-items: center; gap: 12px;
    }
    .hero-label::before {
      content: ''; display: block;
      width: 32px; height: 1px; background: var(--red);
    }
    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(64px, 8vw, 100px);
      font-weight: 300; line-height: 0.95;
      letter-spacing: -0.02em;
      margin-bottom: 40px; color: var(--white);
    }
    .hero-name em { font-style: italic; color: var(--gold); }
    .hero-intro {
      font-size: 17px; line-height: 1.8;
      color: var(--grey); margin-bottom: 48px; max-width: 480px;
    }
    .hero-intro strong { color: var(--white); font-weight: 400; }
    .hero-cta { display: flex; gap: 20px; flex-wrap: wrap; }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 28px; background: var(--red);
      color: var(--white); text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-primary:hover { background: #c4080f; transform: translateY(-1px); }

    .btn-secondary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 28px; border: 1px solid var(--border);
      color: var(--grey); text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--grey); color: var(--white); }

    .hero-right {
      display: flex; flex-direction: column; gap: 1px;
      border: 1px solid var(--border);
    }
    .stat-row {
      display: flex; padding: 28px 32px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      gap: 24px; align-items: flex-start; transition: background 0.2s;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-row:hover { background: var(--bg3); }
    .stat-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px; font-weight: 300;
      color: var(--red); line-height: 1; min-width: 80px;
    }
    .stat-label { font-size: 13px; color: var(--grey); line-height: 1.6; padding-top: 4px; }
    .stat-label strong {
      display: block; color: var(--white); font-weight: 400;
      font-size: 14px; margin-bottom: 4px;
    }

    .expect-section {
      padding: 100px 60px;
      border-top: 1px solid var(--border);
    }
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--red);
      margin-bottom: 48px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-label::before {
      content: ''; display: block;
      width: 32px; height: 1px; background: var(--red);
    }
    .expect-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--border);
    }
    .expect-card {
      background: var(--bg2); padding: 40px; transition: background 0.2s;
    }
    .expect-card:hover { background: var(--bg3); }
    .expect-icon {
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.2em;
      color: var(--gold); margin-bottom: 20px;
    }
    .expect-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 400;
      color: var(--white); margin-bottom: 12px; line-height: 1.2;
    }
    .expect-desc { font-size: 13px; color: var(--grey); line-height: 1.7; }

    .projects-section {
      padding: 100px 60px;
      border-top: 1px solid var(--border);
    }
    .projects-header {
      display: flex; justify-content: space-between;
      align-items: flex-end; margin-bottom: 60px;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 4vw, 52px);
      font-weight: 300; line-height: 1.1; color: var(--white);
    }
    .projects-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 1px; background: var(--border);
    }
